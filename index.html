<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azuma - 待ち時間表示</title>

    <style>
        body {
            margin: 0;
            font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
            background-color: #f5f0e6;
            color: #3e2f1c;
            text-align: center;
        }

        header {
            background-color: #7a1f2a;
            color: white;
            padding: 30px 10px;
        }

        h1 {
            margin: 0;
            font-size: 2.4rem;
            letter-spacing: 0.1em;
        }

        .counter-box {
            background-color: #c8b090;
            margin: 30px auto;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            border-radius: 10px;
            font-size: 1.2rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .counter-number {
            font-size: 3rem;
            font-weight: bold;
            margin-top: 10px;
            color: #7a1f2a;
        }

        .nav-buttons {
            margin-top: 40px;
        }

        .nav-buttons a {
            display: inline-block;
            background-color: #7a1f2a;
            color: white;
            padding: 14px 40px;
            margin: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.3rem;
            letter-spacing: 0.05em;
            transition: 0.2s;
        }

        .nav-buttons a:hover {
            background-color: #5c1820;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9rem;
            color: #7a1f2a;
        }
    </style>
</head>

<body>

<header>
    <h1>Azuma - 待ち時間表示</h1>
</header>

<div class="counter-box">
    <div>このページの閲覧数</div>
    <div id="counter" class="counter-number">読み込み中...</div>
</div>

<div class="nav-buttons">
    <a href="start.html">スタート</a>
</div>

<footer>
    © Yushi Information
</footer>

<script>
async function updateCounter() {
    const url = "https://raw.githubusercontent.com/hachioji-east-information-club/Azuma-Shirakashi-fes_2026/main/counter.json";

    // 現在のカウントを取得
    const res = await fetch(url + "?t=" + Date.now());
    const data = await res.json();
    let count = data.count + 1;

    // 表示
    document.getElementById("counter").textContent = count;

    // GitHub に更新を送る（Issues を使う）
    await fetch("https://api.github.com/repos/hachioji-east-information-club/Azuma-Shirakashi-fes_2026/issues", {
        method: "POST",
        headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": "token GITHUB_TOKEN"
        },
        body: JSON.stringify({
            title: "update counter",
            body: String(count)
        })
    });
}

updateCounter();
</script>

</body>
</html>
