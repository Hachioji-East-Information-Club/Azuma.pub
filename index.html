<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azuma - 待ち時間表示</title>

    <style>
        body {
            margin: 0;
            font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
            background-color: #f5f0e6;
            color: #3e2f1c;
            text-align: center;
        }

        header {
            background-color: #7a1f2a;
            color: white;
            padding: 30px 10px;
        }

        h1 {
            margin: 0;
            font-size: 2.4rem;
            letter-spacing: 0.1em;
        }

        .counter-box {
            background-color: #c8b090;
            margin: 30px auto;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            border-radius: 10px;
            font-size: 1.2rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .counter-img {
            margin-top: 10px;
        }

        .nav-buttons {
            margin-top: 40px;
        }

        .nav-buttons a {
            display: inline-block;
            background-color: #7a1f2a;
            color: white;
            padding: 14px 40px;
            margin: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.3rem;
            letter-spacing: 0.05em;
            transition: 0.2s;
        }

        .nav-buttons a:hover {
            background-color: #5c1820;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9rem;
            color: #7a1f2a;
        }
    </style>
</head>

<body>

<header>
    <h1>Azuma - 待ち時間表示</h1>
</header>

<div class="counter-box">
    <div>このページの閲覧数</div>

    <!-- ここに自作画像カウンターを表示 -->
    <img id="counterImage" class="counter-img" alt="アクセス数">
</div>

<div class="nav-buttons">
    <a href="start.html">スタート</a>
</div>

<footer>
    © Yushi Information
</footer>

<script>
/* ひなた専用：全員のアクセス数をカウントする */
async function updateCounter() {
    const namespace = "azuma_fes_2026";
    const key = "page_views";

    // CountAPI（CORS対応版）
    const url = `https://api.countapi.xyz/update/${namespace}/${key}/?amount=1`;

    let count = 0;

    try {
        const res = await fetch(url);
        const data = await res.json();
        count = data.value;
    } catch (e) {
        count = 0;
    }

    // 数字を画像として描画
    const canvas = document.createElement("canvas");
    canvas.width = 300;
    canvas.height = 100;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#7a1f2a";
    ctx.font = "bold 60px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(count, 150, 50);

    document.getElementById("counterImage").src = canvas.toDataURL();
}

updateCounter();
</script>

</body>
</html>
