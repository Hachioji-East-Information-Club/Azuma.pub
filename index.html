<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azuma - 待ち時間表示</title>

    <style>
        body {
            margin: 0;
            font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
            background-color: #f5f0e6;
            color: #3e2f1c;
            text-align: center;
        }

        header {
            background-color: #7a1f2a;
            color: white;
            padding: 30px 10px;
        }

        h1 {
            margin: 0;
            font-size: 2.4rem;
            letter-spacing: 0.1em;
        }

        .counter-box {
            background-color: #c8b090;
            margin: 30px auto;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            border-radius: 10px;
            font-size: 1.2rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .counter-number {
            font-size: 3rem; /* ← 数字を大きくする */
            font-weight: bold;
            margin-top: 10px;
            color: #7a1f2a;
        }

        .nav-buttons {
            margin-top: 40px;
        }

        .nav-buttons a {
            display: inline-block;
            background-color: #7a1f2a;
            color: white;
            padding: 14px 40px;
            margin: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.3rem;
            letter-spacing: 0.05em;
            transition: 0.2s;
        }

        .nav-buttons a:hover {
            background-color: #5c1820;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9rem;
            color: #7a1f2a;
        }
    </style>
</head>

<body>

<header>
    <h1>Azuma - 待ち時間表示</h1>
</header>

<div class="counter-box">
    <div>このページの閲覧数</div>
    <div id="counter" class="counter-number">読み込み中...</div>
</div>

<div class="nav-buttons">
    <a href="start.html">スタート</a>
</div>

<footer>
    © Yushi Information
</footer>

<script>
    async function updateCounter() {
        const counter = document.getElementById("counter");

        try {
            // Hits.sh の JSON API（数字だけ取得）
            const res = await fetch("https://hits.sh/hachioji-east-information-club.github.io/Azuma-Shirakashi-fes_2026.json?increment=1");
            const data = await res.json();

            // data.hits に数字が入っている
            counter.textContent = data.hits;
        } catch (e) {
            console.error("カウンター取得エラー:", e);
            counter.textContent = "エラー";
        }
    }

    updateCounter();
</script>

</body>
</html>
